server {
    server_name xxar.ru www.xxar.ru;

    # Serve production build from dist directory
    root /data/xHomePro/xHome/movie-book-portal/frontend-react/dist;
    index index.html;

    # Public files - allow access without authentication (must be before access check)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Content-Type "application/javascript; charset=utf-8";
        try_files $uri =404;
    }

    location ~ ^/workbox-.*\.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Type "application/javascript; charset=utf-8";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        try_files $uri =404;
    }

    # APK downloads - public access for OTA updates
    location /uploads/apk/ {
        alias /data/xHomePro/xHome/movie-book-portal/backend/uploads/apk/;
        add_header Content-Type "application/vnd.android.package-archive";
        try_files $uri =404;
    }

    # Protected locations - check access first
    set $allow_access 0;
    if ($remote_addr ~* "^192\.168\.0\.|^127\.0\.0\.1$") {
        set $allow_access 1;
    }
    if ($http_user_agent ~* "xWV2-App-Identifier") {
        set $allow_access 1;
    }

    # Apply access check only to protected locations
    location / {
        if ($allow_access = 0) {
            return 403;
        }
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        if ($allow_access = 0) {
            return 403;
        }
        proxy_pass http://127.0.0.1:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        if ($allow_access = 0) {
            return 403;
        }
        proxy_pass http://127.0.0.1:5055;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /uploads/ {
        if ($allow_access = 0) {
            return 403;
        }
        proxy_pass http://127.0.0.1:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/xxar.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/xxar.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.xxar.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = xxar.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name xxar.ru www.xxar.ru;
    return 404; # managed by Certbot
}
