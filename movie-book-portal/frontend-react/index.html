<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Media Portal</title>
  <style>
    body {
      background-color: #141414;
      color: #ffffff;
      margin: 0;
      font-family: sans-serif;
    }
    #root:empty::before {
      content: "Загрузка...";
      display: block;
      padding: 50px;
      text-align: center;
      color: #888;
    }
  </style>
  <script>
    // Reload page if a script or chunk fails to load after an update
    window.onerror = function (message, source, lineno, colno, error) {
      if (message.includes('ChunkLoadError') || message.includes('Loading chunk')) {
        console.warn('Chunk load error detected, reloading...');
        if (navigator.onLine) {
          window.location.reload();
        } else {
          document.body.innerHTML = '<div style="color:white;text-align:center;padding:50px;font-family:sans-serif;background:#1a1a1a;height:100vh;"><h1>Ошибка кэша</h1><p>Оффлайн версия повреждена или не загружена полностью. Подключитесь к интернету.</p></div>';
        }
      }
    };
    window.addEventListener('error', function (e) {
      if (e.target.tagName === 'SCRIPT') {
        console.warn('Script failed to load:', e.target.src);
        // Only reload if it's a chunk from our assets
        if (e.target.src.includes('/assets/')) {
          if (navigator.onLine) {
            window.location.reload();
          } else {
            document.body.innerHTML = '<div style="color:white;text-align:center;padding:50px;font-family:sans-serif;background:#1a1a1a;height:100vh;"><h1>Ошибка кэша</h1><p>Оффлайн версия повреждена или не загружена полностью. Подключитесь к интернету.</p></div>';
          }
        }
      }
    }, true);
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
