<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оффлайн - xHome</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #141414;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #ef4444; }
        p { font-size: 16px; color: #9ca3af; margin: 0 20px; line-height: 1.5; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ef4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .retry-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .retry-btn:hover { background: #dc2626; }
        #status { margin-top: 15px; font-size: 14px; color: #fbbf24; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h1>Нет подключения к серверу</h1>
    <p>Проверьте подключение к Wi-Fi сети дома или включите VPN.</p>
    <p id="status">Попытка загрузки сохранённой версии...</p>
    <button class="retry-btn" onclick="retryLoad()">Попробовать снова</button>
    
    <script>
        // Get the current path from URL
        const currentPath = window.location.pathname || '/';
        
        // Try to load the main app from Service Worker cache
        setTimeout(function() {
            const statusEl = document.getElementById('status');
            
            // Try to reload the current page - Service Worker should serve from cache
            fetch(currentPath, { cache: 'force-cache' })
                .then(response => {
                    if (response.ok) {
                        statusEl.textContent = '✓ Кэш найден! Перезагрузка...';
                        statusEl.style.color = '#34d399';
                        setTimeout(() => {
                            window.location.href = currentPath;
                        }, 1000);
                    } else {
                        statusEl.textContent = '✗ Кэш не найден. Подключитесь к интернету.';
                        statusEl.style.color = '#f87171';
                    }
                })
                .catch(err => {
                    console.log('Cache load failed:', err);
                    statusEl.textContent = '✗ Кэш недоступен. Проверьте подключение.';
                    statusEl.style.color = '#f87171';
                });
        }, 500);
        
        function retryLoad() {
            document.getElementById('status').textContent = 'Повторная попытка...';
            setTimeout(() => {
                window.location.reload();
            }, 500);
        }
    </script>
</body>
</html>
